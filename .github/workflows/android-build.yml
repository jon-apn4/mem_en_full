name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4
      - name: Node.jsセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Java(JDK)セットアップ
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: npm依存関係インストール
        run: npm ci
      - name: 書き出し・戻るボタン・ステータスバー機能用プラグインをインストール
        run: npm install @capacitor/filesystem @capacitor/share @capacitor/app @capacitor/status-bar
      - name: Web資産をAndroidプロジェクトへ同期
        run: npx cap sync android
      - name: gradlewに実行権限を付与
        run: chmod +x android/gradlew
      - name: APKビルド
        run: cd android && ./gradlew assembleDebug
      - name: APKをアーティファクトとしてアップロード
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
